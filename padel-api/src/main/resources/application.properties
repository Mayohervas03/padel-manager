# Nombre de la aplicaciÛn
spring.application.name=padel-api

# --- CONEXI”N BASE DE DATOS (DOCKER) ---
spring.datasource.url=jdbc:postgresql://localhost:5432/padel_club_db
spring.datasource.username=padel_admin
spring.datasource.password=padel_password

# --- CONFIGURACI”N JPA / HIBERNATE ---
# 'update': Actualiza el esquema de la BD autom·ticamente si cambias tus clases Java
spring.jpa.hibernate.ddl-auto=update
# Muestra el SQL en la consola (˙til para ver quÈ est· pasando por debajo)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
