<div class="admin-view">
  <div class="view-header">
    <h2>Rendimiento del Club (General)</h2>
  </div>

  <div class="stats-grid">
    <div class="stat-card">
      <h3>Uso de Pistas (Global)</h3>
      <div class="chart-container" *ngIf="barChartData">
        <canvas baseChart [data]="barChartData" [options]="barChartOptions" type="bar"></canvas>
      </div>
    </div>
    
    <div class="stat-card">
      <h3>Distribución por Horarios</h3>
      <div class="chart-container" *ngIf="pieChartData">
        <canvas baseChart [data]="pieChartData" [options]="pieChartOptions" type="doughnut"></canvas>
      </div>
    </div>
    
    <div class="stat-card full-width">
      <h3>Ingresos Consolidados (Últimos activos)</h3>
      <div class="chart-container" *ngIf="lineChartData">
        <canvas baseChart [data]="lineChartData" [options]="lineChartOptions" type="line"></canvas>
      </div>
    </div>
  </div>
</div>
