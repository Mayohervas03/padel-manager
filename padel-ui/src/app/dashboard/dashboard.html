<div class="container mt-4">
  <div class="row mb-4">
    <div class="col-12">
      <h2>Panel de Control</h2>
      <p class="text-muted">Resumen global de instalaciones y usuarios del club.</p>
    </div>
  </div>

  <div *ngIf="cargando" class="text-center my-5">
    <div class="spinner-border text-primary" role="status">
      <span class="visually-hidden">Cargando...</span>
    </div>
  </div>

  <div class="row g-4" *ngIf="!cargando">
    
    <!-- Tarjeta Usuarios -->
    <div class="col-md-6 col-lg-3">
      <div class="card text-white bg-primary h-100 shadow-sm">
        <div class="card-body d-flex flex-column align-items-center justify-content-center text-center">
          <h5 class="card-title text-uppercase">Usuarios Totales</h5>
          <h1 class="display-3 fw-bold mb-0">{{ stats.totalUsuarios }}</h1>
        </div>
      </div>
    </div>

    <!-- Tarjeta Pistas -->
    <div class="col-md-6 col-lg-3">
      <div class="card text-white bg-success h-100 shadow-sm">
        <div class="card-body d-flex flex-column align-items-center justify-content-center text-center">
          <h5 class="card-title text-uppercase">Pistas Registradas</h5>
          <h1 class="display-3 fw-bold mb-0">{{ stats.totalPistas }}</h1>
        </div>
      </div>
    </div>

    <!-- Tarjeta Reservas Totales -->
    <div class="col-md-6 col-lg-3">
      <div class="card text-dark bg-warning h-100 shadow-sm">
        <div class="card-body d-flex flex-column align-items-center justify-content-center text-center">
          <h5 class="card-title text-uppercase">Reservas Historicas</h5>
          <h1 class="display-3 fw-bold mb-0">{{ stats.reservasTotales }}</h1>
        </div>
      </div>
    </div>

    <!-- Tarjeta Reservas Hoy -->
    <div class="col-md-6 col-lg-3">
      <div class="card text-white bg-info h-100 shadow-sm">
        <div class="card-body d-flex flex-column align-items-center justify-content-center text-center">
          <h5 class="card-title text-uppercase">Reservas Hoy</h5>
          <h1 class="display-3 fw-bold mb-0">{{ stats.reservasHoy }}</h1>
        </div>
      </div>
    </div>

  </div>
</div>
