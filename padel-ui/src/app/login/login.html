<div class="row justify-content-center mt-5">
  <div class="col-md-6 col-lg-4">
    <div class="card shadow-sm">
      <div class="card-body">
        <h3 class="card-title text-center mb-4">Iniciar Sesión</h3>

        <div *ngIf="errorMessage" class="alert alert-danger" role="alert">
          {{ errorMessage }}
        </div>

        <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
          <div class="mb-3">
            <label for="email" class="form-label">Correo Electrónico</label>
            <input type="email" class="form-control" id="email" name="email" 
                   [(ngModel)]="credentials.email" required email #email="ngModel">
            <div *ngIf="email.invalid && (email.dirty || email.touched)" class="text-danger small mt-1">
              Ingresa un email válido.
            </div>
          </div>

          <div class="mb-3">
            <label for="password" class="form-label">Contraseña</label>
            <input type="password" class="form-control" id="password" name="password" 
                   [(ngModel)]="credentials.password" required #password="ngModel">
            <div *ngIf="password.invalid && (password.dirty || password.touched)" class="text-danger small mt-1">
              La contraseña es obligatoria.
            </div>
          </div>

          <div class="d-grid mt-4">
            <button type="submit" class="btn btn-primary" [disabled]="loginForm.invalid">Entrar</button>
          </div>
        </form>

        <div class="text-center mt-3">
          <p class="mb-0">¿No tienes cuenta? <a routerLink="/register">Regístrate</a></p>
        </div>
      </div>
    </div>
  </div>
</div>
