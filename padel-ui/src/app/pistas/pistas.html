<div class="container mt-4 mb-5">
  
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="text-light" style="font-family: 'Oswald', sans-serif;">Gestión de Pistas</h2>
    <button *ngIf="authService.isAdmin()" class="btn-neon" (click)="toggleFormulario()">
      + Nueva Pista
    </button>
  </div>

  <div class="card card-neon shadow-sm mb-4" *ngIf="mostrarFormulario && authService.isAdmin()">
    <div class="card-body">
      <h5 class="card-title text-accent mb-3" style="font-family: 'Oswald', sans-serif;">{{ nuevaPista.id ? 'Editar Pista' : 'Añadir Nueva Pista' }}</h5>
      <div class="row g-3">
        <div class="col-md-4">
          <label class="form-label label-neon">Nombre</label>
          <input type="text" class="form-control input-neon" [(ngModel)]="nuevaPista.nombre" placeholder="Ej: Pista Central">
        </div>
        <div class="col-md-4">
          <label class="form-label label-neon">Tipo</label>
          <select class="form-select input-neon" [(ngModel)]="nuevaPista.tipo">
            <option value="Indoor">Indoor</option>
            <option value="Outdoor">Outdoor</option>
          </select>
        </div>
        <div class="col-md-4">
          <label class="form-label label-neon">Precio (€/hora)</label>
          <input type="number" class="form-control input-neon" [(ngModel)]="nuevaPista.precio">
        </div>
        <div class="col-12 mt-4 d-flex justify-content-end align-items-center">
          <button class="btn btn-outline-secondary me-3" style="border-radius: 4px; border-color: rgba(255,255,255,0.2); color: #ccc;" (click)="limpiarFormulario()">Cancelar</button>
          <button class="btn-neon" (click)="guardarPista()">Guardar</button>
        </div>
      </div>
    </div>
  </div>

  <div class="card card-neon shadow-sm">
    <div class="card-body p-0">
      <table class="table table-dark table-hover mb-0" style="border-radius: 8px; overflow: hidden; margin-bottom: 0;">
        <thead>
          <tr style="border-bottom: 2px solid var(--accent-neon);">
            <th>ID</th>
            <th>Nombre</th>
            <th>Tipo</th>
            <th>Precio</th>
            <th *ngIf="authService.isAdmin()">Acciones</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let pista of pistas">
            <td>{{ pista.id }}</td>
            <td><strong>{{ pista.nombre }}</strong></td>
            <td>
              <span class="badge" 
                    [ngClass]="pista.tipo === 'Indoor' ? 'badge-indoor' : 'badge-outdoor'">
                {{ pista.tipo }}
              </span>
            </td>
            <td>{{ pista.precio }} €</td>
            <td *ngIf="authService.isAdmin()" style="min-width: 100px;">
              <button class="btn btn-sm btn-action me-2" (click)="editarPista(pista)" title="Editar">✏️</button>
              <button class="btn btn-sm btn-action" (click)="borrarPista(pista.id)" title="Borrar">🗑️</button>
            </td>
          </tr>
          
          <tr *ngIf="pistas.length === 0">
            <td [attr.colspan]="authService.isAdmin() ? 5 : 4" class="text-center py-4 text-muted">
              Cargando datos o no hay pistas registradas...
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
