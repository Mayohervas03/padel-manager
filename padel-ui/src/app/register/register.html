<div class="row justify-content-center mt-5">
  <div class="col-md-6 col-lg-5">
    <div class="card shadow-sm">
      <div class="card-body">
        <h3 class="card-title text-center mb-4">Registro</h3>

        <div *ngIf="errorMessage" class="alert alert-danger" role="alert">
          {{ errorMessage }}
        </div>
        <div *ngIf="successMessage" class="alert alert-success" role="alert">
          {{ successMessage }}
        </div>

        <form (ngSubmit)="onSubmit()" #registerForm="ngForm">

          <div class="mb-3">
            <label for="nombre" class="form-label">Nombre Completo</label>
            <input type="text" class="form-control" id="nombre" name="nombre" 
                   [(ngModel)]="user.nombre" required minlength="3" #nombre="ngModel">
            <div *ngIf="nombre.invalid && (nombre.dirty || nombre.touched)" class="text-danger small mt-1">
              El nombre es obligatorio y debe tener mínimo 3 caracteres.
            </div>
          </div>

          <div class="mb-3">
            <label for="email" class="form-label">Correo Electrónico</label>
            <input type="email" class="form-control" id="email" name="email" 
                   [(ngModel)]="user.email" required email #email="ngModel">
            <div *ngIf="email.invalid && (email.dirty || email.touched)" class="text-danger small mt-1">
              Ingresa un email válido.
            </div>
          </div>

          <div class="mb-3">
            <label for="password" class="form-label">Contraseña</label>
            <input type="password" class="form-control" id="password" name="password" 
                   [(ngModel)]="user.password" required minlength="4" #password="ngModel">
            <div *ngIf="password.invalid && (password.dirty || password.touched)" class="text-danger small mt-1">
              La contraseña es obligatoria (mínimo 4 caracteres).
            </div>
          </div>

          <div class="d-grid mt-4">
            <button type="submit" class="btn btn-success" [disabled]="registerForm.invalid">Crear Cuenta</button>
          </div>
        </form>

        <div class="text-center mt-3">
          <p class="mb-0">¿Ya tienes cuenta? <a routerLink="/login">Inicia Sesión</a></p>
        </div>
      </div>
    </div>
  </div>
</div>
