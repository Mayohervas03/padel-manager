<div class="row mb-4">
  <div class="col-12">
    <div class="card">
      <div class="card-header bg-primary text-white">
        <h5 class="mb-0">Nueva Reserva</h5>
      </div>
      <div class="card-body">
        <form (ngSubmit)="guardarReserva()">
          <div class="row g-3 align-items-end">

            <div class="col-md-3">
              <label for="pistaId" class="form-label">Pista</label>
              <select class="form-select" id="pistaId" name="pistaId" [(ngModel)]="nuevaReserva.pistaId" required>
                <option [ngValue]="null">Selecciona pista...</option>
                <option *ngFor="let p of pistas" [ngValue]="p.id">{{ p.nombre }}</option>
              </select>
            </div>
            
            <div class="col-md-2">
              <label for="fecha" class="form-label">Fecha</label>
              <input type="date" class="form-control" id="fecha" name="fecha" [(ngModel)]="nuevaReserva.fecha" required>
            </div>
            
            <div class="col-md-2">
              <label for="hora" class="form-label">Hora (0-23)</label>
              <input type="number" class="form-control" id="hora" name="hora" [(ngModel)]="nuevaReserva.hora" min="0" max="23" required>
            </div>

            <div class="col-md-2">
              <button type="submit" class="btn btn-success w-100" [disabled]="cargando">
                {{ cargando ? '⏳ Guardando...' : 'Guardar Reserva' }}
              </button>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

<div class="row">
  <div class="col-12">
    <div class="card">
      <div class="card-header bg-secondary text-white">
        <h5 class="mb-0">Listado de Reservas</h5>
      </div>
      <div class="card-body table-responsive">
        <table class="table table-striped table-hover align-middle">
          <thead>
            <tr>
              <th>ID</th>
              <th>Usuario</th>
              <th>Pista</th>
              <th>Fecha</th>
              <th>Hora</th>
              <th class="text-end">Acciones</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let reserva of reservas">
              <td>{{ reserva.id }}</td>
              <td>{{ reserva.usuario?.nombre }}</td>
              <td>{{ reserva.pista?.nombre }}</td>
              <td>{{ reserva.fecha }}</td>
              <td>{{ reserva.hora }}:00</td>
              <td class="text-end">
                <button class="btn btn-danger btn-sm" (click)="borrarReserva(reserva.id)">Eliminar</button>
              </td>
            </tr>
            <tr *ngIf="reservas.length === 0">
              <td colspan="6" class="text-center text-muted">No hay reservas registradas.</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
