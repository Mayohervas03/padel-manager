<div class="container mt-4">
  
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Gestión de Usuarios</h2>
    <button class="btn btn-primary" (click)="toggleFormulario()">
      + Nuevo Usuario
    </button>
  </div>

  <div class="card shadow-sm mb-4" *ngIf="mostrarFormulario">
    <div class="card-body">
      <h5 class="card-title mb-3">{{ nuevoUsuario.id ? 'Editar Usuario' : 'Nuevo Usuario' }}</h5>
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label">Nombre</label>
          <input type="text" class="form-control" [(ngModel)]="nuevoUsuario.nombre">
        </div>
        <div class="col-md-6">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" [(ngModel)]="nuevoUsuario.email">
        </div>
        <div class="col-md-6">
          <label class="form-label">Rol</label>
          <select class="form-select" [(ngModel)]="nuevoUsuario.rol">
            <option value="JUGADOR">Jugador</option>
            <option value="ADMIN">Administrador</option>
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label">Contraseña</label>
          <input type="password" class="form-control" [(ngModel)]="nuevoUsuario.password">
        </div>
        <div class="col-12 mt-3 d-flex justify-content-end">
          <button class="btn btn-success" (click)="guardarUsuario()">
            {{ nuevoUsuario.id ? 'Actualizar' : 'Guardar' }}
          </button>
        </div>
      </div>
    </div>
  </div>

  <div class="card shadow-sm">
    <div class="card-body p-0">
      <table class="table table-striped table-hover mb-0">
        <thead class="table-light">
          <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Email</th>
            <th>Rol</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let usuario of usuarios">
            <td>{{ usuario.id }}</td>
            <td><strong>{{ usuario.nombre }}</strong></td>
            <td>{{ usuario.email }}</td>
            <td>
              <span class="badge" 
                    [ngClass]="usuario.rol === 'ADMIN' ? 'bg-danger' : 'bg-success'">
                {{ usuario.rol }}
              </span>
            </td>
            <td>
              <button class="btn btn-sm btn-outline-secondary me-2" (click)="editarUsuario(usuario)">Editar</button>
              <button class="btn btn-sm btn-outline-danger" (click)="borrarUsuario(usuario.id)">Borrar</button>
            </td>
          </tr>
          
          <tr *ngIf="usuarios.length === 0">
            <td colspan="5" class="text-center py-4">
              Cargando datos o lista vacía...
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
